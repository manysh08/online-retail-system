{% extends "base.html" %}

{% block title %}Add Product - Nexus Admin{% endblock %}

{% block extra_css %}
<style>
    .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .form-container {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 2rem;
        backdrop-filter: blur(10px);
        max-width: 800px;
        margin: 0 auto;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #fff;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        font-size: 1rem;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--highlight);
        background: rgba(255, 255, 255, 0.08);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        justify-content: center;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="admin-header">
        <h1><i class="fas fa-plus"></i> Add New Product</h1>
        <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Products
        </a>
    </div>

    <div class="form-container">
        <form method="POST" action="{{ url_for('add_product') }}">
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Product Name</label>
                <input type="text" name="name" required placeholder="Enter product name">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-list"></i> Category</label>
                    <select name="category" required>
                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Home & Kitchen">Home & Kitchen</option>
                        <option value="Sports & Fitness">Sports & Fitness</option>
                        <option value="Books">Books</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-warehouse"></i> Stock</label>
                    <input type="number" name="stock" required min="0" placeholder="Enter stock quantity">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea name="description" placeholder="Enter product description"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Price</label>
                    <input type="number" name="price" required step="0.01" min="0" placeholder="Enter selling price">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-line-chart"></i> Original Price</label>
                    <input type="number" name="original_price" step="0.01" min="0" placeholder="Enter original price (for discount)">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> Image URL</label>
                <input type="url" name="image_url" placeholder="Enter image URL or leave for placeholder" value="https://via.placeholder.com/400">
            </div>

            <div class="button-group">
                <button type="reset" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Add Product
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
