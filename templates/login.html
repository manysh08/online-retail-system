{% extends "base.html" %}

{% block title %}Login - Nexus{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 4rem auto;
        animation: fadeIn 0.6s ease;
    }

    .auth-card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
        border: 1px solid rgba(233, 69, 96, 0.3);
        border-radius: 12px;
        padding: 2.5rem;
        backdrop-filter: blur(10px);
    }

    .auth-card h2 {
        font-family: 'Montserrat', sans-serif;
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--highlight) 0%, #ff6b9d 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .auth-subtitle {
        color: #ccc;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .auth-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }

    .auth-buttons .btn {
        width: 100%;
        justify-content: center;
        font-size: 0.9rem;
    }

    .divider {
        text-align: center;
        margin: 1.5rem 0;
        position: relative;
    }

    .divider::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
        position: relative;
        background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
        padding: 0 0.5rem;
        color: #999;
        font-size: 0.85rem;
    }

    .signup-link {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .signup-link a {
        color: var(--highlight);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .signup-link a:hover {
        color: #ff6b9d;
    }

    .admin-link {
        text-align: center;
        margin-top: 1rem;
    }

    .admin-link a {
        color: #ccc;
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }

    .admin-link a:hover {
        color: var(--highlight);
    }

    .form-group input {
        width: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            <p class="auth-subtitle">Sign in to your account to continue shopping</p>

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-arrow-right"></i> Sign In
                </button>
            </form>

            <div class="divider"><span>OR</span></div>

            <div class="auth-buttons">
                <a href="/" class="btn btn-secondary">Continue as Guest</a>
                <a href="/products" class="btn btn-secondary">Browse Shop</a>
            </div>

            <div class="signup-link">
                <p>Don't have an account?</p>
                <a href="/register"><i class="fas fa-user-plus"></i> Create new account</a>
            </div>

            <div class="admin-link">
                <a href="/admin-login"><i class="fas fa-shield-alt"></i> Admin Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
